<footer id="footer-1147">
    <div class="cs-container">
        <div class="cs-top">
            <a aria-label="go back to home" class="cs-logo" href="#hero">
                <img
                    class="cs-logo-img light"
                    loading="lazy"
                    decoding="async"
                    src="/assets/images/webber.webp"
                    alt="Webber Creative"
                    width="264"
                    height="78"
                    sizes="(max-width: 600px) 168px, 264px"
                />
            </a>
            <ul class="cs-ul">
                <li class="cs-li">
                    <a href="/" class="cs-link">Home</a>
                </li>
                <li class="cs-li">
                    <a href="/about/" class="cs-link">About</a>
                </li>
                <li class="cs-li">
                    <a href="/process/" class="cs-link">Process</a>
                </li>
                <li class="cs-li">
                    <a href="/pricing/" class="cs-link">Pricing</a>
                </li>
                <li class="cs-li">
                    <a href="/contact/" class="cs-link">Contact</a>
                </li>
            </ul>
        </div>
        <div class="cs-bottom">
            <!--Social-->
            <ul class="cs-social">
                <li class="cs-social-li">
                    <a
                        href="{{ client.socials.facebook }}"
                        class="cs-social-link"
                        aria-label="facebook"
                        target="_blank"
                        rel="noopener"
                    >
                        <img
                            class="cs-social-icon cs-default"
                            src="/assets/svgs/facebook-white.svg"
                            alt="icon"
                            loading="lazy"
                            decoding="async"
                            width="12"
                            height="12"
                            aria-hidden="true"
                        />
                    </a>
                </li>
                <li class="cs-social-li">
                    <a
                        href="{{ client.socials.linkedin }}"
                        class="cs-social-link"
                        aria-label="linkedin"
                        target="_blank"
                        rel="noopener"
                    >
                        <img
                            class="cs-social-icon cs-default"
                            src="/assets/svgs/linkedin-white.svg"
                            alt="icon"
                            loading="lazy"
                            decoding="async"
                            width="12"
                            height="12"
                            aria-hidden="true"
                        />
                    </a>
                </li>
                <li class="cs-social-li">
                    <a
                        href="{{ client.socials.instagram }}"
                        class="cs-social-link"
                        aria-label="instagram"
                        target="_blank"
                        rel="noopener"
                    >
                        <img
                            class="cs-social-icon cs-default"
                            src="/assets/svgs/instagram-transparent.svg"
                            alt="icon"
                            loading="lazy"
                            decoding="async"
                            width="12"
                            height="12"
                            aria-hidden="true"
                        />
                    </a>
                </li>
            </ul>
            <span class="cs-copyright">
                © Copyright {% year %}
                <a href="/" class="cs-copyright-link">Webber Creative</a>
                &middot;
                <a href="/privacy/" class="cs-copyright-link">Privacy Policy</a>
                &middot;
                <a href="/terms/" class="cs-copyright-link">Terms &amp; Conditions</a>
            </span>
        </div>
    </div>
    <!--Background-->
    <div class="cs-background">
        <img
            loading="lazy"
            decoding="async"
            src="/assets/images/code.jpg"
            alt="code background"
            width="1280"
            height="568"
        />
    </div>
</footer>
